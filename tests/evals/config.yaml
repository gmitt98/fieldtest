schema_version: 1

system:
  name: fieldtest
  domain: CLI eval tool — scores AI system outputs, writes results files (json + md + csv)

# Dogfood suite: fieldtest evaluating its own scoring output.
#
# The dogfood runner (tests/evals/runner.py) invokes `fieldtest score` against
# controlled test projects and captures the resulting JSON file as the output
# for each fixture × run. Those outputs live in tests/evals/outputs/.
#
# This config then runs `fieldtest score --config tests/evals/config.yaml`
# to evaluate the captured JSONs — the tool scoring itself.
#
# MD/CSV format is tested in unit tests (tests/test_cli.py). This suite
# focuses on runtime behavior: aggregation correctness, error handling, exit codes.

use_cases:

  - id: score_results
    description: >
      fieldtest score produces correct results — aggregation math, error handling,
      and well-formed JSON output.

    evals:

      # -----------------------------------------------------------------------
      # RIGHT — correctness of aggregation math
      # -----------------------------------------------------------------------

      - id: failure_rate_accurate
        tag: right
        type: rule
        description: >
          failure_rate values in result JSON are valid floats in [0.0, 1.0];
          skipped and error rows are excluded from the denominator

      - id: error_rows_excluded
        tag: right
        type: rule
        description: >
          rows with error set have passed=null and are counted in error_count,
          not in failure_rate — run still completes and result file is written

      - id: delta_direction_correct
        tag: right
        type: rule
        description: >
          delta increased/decreased arrays reference only eval IDs present in
          summary; arrays are empty when no baseline exists

      # -----------------------------------------------------------------------
      # GOOD — output quality
      # -----------------------------------------------------------------------

      - id: json_keys_present
        tag: good
        type: rule
        description: >
          result JSON parses without error and contains run_id, rows, summary,
          and delta keys

      # -----------------------------------------------------------------------
      # SAFE — exit codes and failure modes
      # -----------------------------------------------------------------------

      - id: exit_0_on_success
        tag: safe
        type: rule
        description: >
          fieldtest score exits 0 and writes a result file when all outputs are
          present and config is valid

    fixtures:
      directory: fixtures/
      sets:
        smoke: [score_basic, score_with_judge_errors]
        full:  all
      runs: 3

defaults:
  provider: anthropic
  model: claude-haiku-3-5-20251001
  runs: 3
