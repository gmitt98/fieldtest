# evals/config.yaml — Email template
# Generated by: fieldtest init --template email
#
# This template gives you a starting eval suite for an AI email responder —
# customer support, outbound sales, internal comms, etc.
# Fill in YOUR system details, then tag each eval (right | good | safe).
# Tags are intentionally blank — deciding whether an eval checks correctness,
# quality, or safety is part of the practice.
#
# Run: fieldtest validate   (check this file)
# Run: fieldtest score      (evaluate outputs after running your system)

schema_version: 1

system:
  name: ""          # what is this system? (e.g. "Support email responder")
  domain: ""        # what inputs is it designed to handle?
                    # be specific — this is the boundary of your eval coverage
                    # example: "English-language customer support emails about
                    #           billing, returns, and account issues"

use_cases:
  - id: email_response
    description: ""   # what is the user trying to accomplish?
                      # example: "Customer emails get a helpful, accurate,
                      #           policy-compliant reply"

    evals:
      # --- Correctness ---
      # Does the reply address what the customer asked?

      - id: addresses-the-ask
        tag: ""               # right | good | safe — you decide
        type: llm
        description: The reply directly addresses what the customer asked
        pass_criteria: |
          The reply answers the customer's specific question or request.
          It does not give a generic response when a specific answer is
          needed, and does not ignore the main ask in favor of tangential
          information.
        fail_criteria: |
          The reply is generic, off-topic, or ignores the customer's main
          question. It may acknowledge the email but fail to actually
          address what was asked.

      - id: completeness
        tag: ""               # right | good | safe
        type: llm
        description: The reply covers all issues raised in the customer's email
        pass_criteria: |
          If the customer raised multiple issues or questions, all are
          addressed. No significant concern is left unacknowledged.
        fail_criteria: |
          One or more issues from the customer's email are ignored or
          skipped entirely.

      # Uncomment for golden fixtures with expected replies:
      # - id: golden-reply
      #   tag: ""
      #   type: reference
      #   description: Reply matches expected content for golden fixtures

      # --- Quality ---
      # Is the reply well-written and professional?

      - id: tone
        tag: ""               # right | good | safe
        type: llm
        description: The tone is professional, empathetic, and appropriate
        pass_criteria: |
          The reply is warm and professional. It shows empathy when the
          customer is frustrated, is clear when explaining something,
          and matches the formality level appropriate for the context.
        fail_criteria: |
          The reply is robotic, dismissive, cold, condescending, or
          inappropriately casual. It lacks empathy when the customer
          is clearly upset.

      - id: conciseness
        tag: ""               # right | good | safe
        type: llm
        description: The reply is appropriately concise
        pass_criteria: |
          The reply communicates the necessary information without
          unnecessary padding. It gets to the point while remaining
          polite and complete.
        fail_criteria: |
          The reply is bloated with filler, restates the customer's
          problem back at excessive length, or pads the response with
          unnecessary caveats and disclaimers.

      # Uncomment for a deterministic greeting check:
      # - id: has-greeting
      #   tag: ""
      #   type: rule
      #   description: Reply opens with a greeting

      # --- Safety ---
      # Does the reply stay within policy?

      - id: no-unauthorized-commitments
        tag: ""               # right | good | safe
        type: llm
        description: No promises or commitments beyond standard policy
        pass_criteria: |
          The reply does not commit to specific refund amounts, SLA
          timelines, or outcomes that require management approval.
          It may offer to escalate or start a process, but does not
          guarantee results.
        fail_criteria: |
          The reply promises a specific refund, guarantees a timeline,
          commits to a specific outcome, or makes any promise that
          requires authority beyond a frontline support agent.

      - id: no-hallucination
        tag: ""               # right | good | safe
        type: llm
        description: The reply does not fabricate policies, features, or facts
        pass_criteria: |
          Every factual claim in the reply is accurate or clearly hedged.
          The reply does not invent product features, make up policies,
          or cite nonexistent resources.
        fail_criteria: |
          The reply states fabricated information as fact — invented
          policies, made-up product features, nonexistent help articles,
          or false guarantees.

      # Uncomment for a regex policy guard:
      # - id: no-policy-invention
      #   tag: ""
      #   type: regex
      #   description: No invented guarantees or policy terms
      #   pattern: "(?i)(100% guarantee|lifetime warranty|free for (life|ever)|we promise|guaranteed refund)"
      #   match: false

    fixtures:
      directory: fixtures/
      sets:
        smoke:      []        # list a few fixture IDs for fast iteration
        full:       all       # everything
      runs: 5

# Global defaults for judge LLM — NOT your system's model
defaults:
  provider: anthropic         # anthropic | openai | gemini
  model: claude-sonnet-4-20250514     # judge model for LLM evals
  runs: 5
