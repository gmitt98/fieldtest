# evals/config.yaml — RAG template
# Generated by: fieldtest init --template rag
#
# This template gives you a starting eval suite for a retrieval-augmented
# generation (RAG) system — document Q&A, knowledge base search, etc.
# Fill in YOUR system details, then tag each eval (right | good | safe).
# Tags are intentionally blank — deciding whether an eval checks correctness,
# quality, or safety is part of the practice.
#
# Run: fieldtest validate   (check this file)
# Run: fieldtest score      (evaluate outputs after running your system)

schema_version: 1

system:
  name: ""          # what is this system? (e.g. "Internal docs Q&A assistant")
  domain: ""        # what inputs is it designed to handle?
                    # be specific — this is the boundary of your eval coverage
                    # example: "Questions about company HR policies, answered from
                    #           the employee handbook (2024 edition, English)"

use_cases:
  - id: question_answering
    description: ""   # what is the user trying to accomplish?
                      # example: "Find accurate answers to questions about
                      #           company policies from the knowledge base"

    evals:
      # --- Correctness ---
      # Is the answer right, and does it come from the right source?

      - id: answers-from-context
        tag: ""               # right | good | safe — you decide
        type: llm
        description: The answer is grounded in the retrieved context
        pass_criteria: |
          The answer is directly supported by the retrieved documents or
          context. The reasoning chain from source material to answer is
          traceable. If the context doesn't contain the answer, the response
          says so rather than guessing.
        fail_criteria: |
          The answer includes information not present in the retrieved
          context, or draws conclusions the source material doesn't support.
          The response answers confidently when the context doesn't contain
          relevant information.

      - id: completeness
        tag: ""               # right | good | safe
        type: llm
        description: The answer covers all relevant information from the context
        pass_criteria: |
          If the retrieved context contains multiple relevant pieces of
          information, the answer includes all of them. No significant
          detail from the source material is omitted.
        fail_criteria: |
          The answer cherry-picks from the context and misses important
          details that would change the user's understanding.

      - id: faithfulness-to-source
        tag: ""               # right | good | safe
        type: llm
        description: The answer accurately represents what the source says
        pass_criteria: |
          The answer faithfully represents the source material — no
          paraphrasing that changes meaning, no omission of qualifiers
          or conditions, no exaggeration of claims.
        fail_criteria: |
          The answer distorts the source material — misquotes, drops
          important qualifiers ("usually" becomes "always"), combines
          statements from different contexts to imply something the
          source doesn't say, or overstates the certainty of the source.

      # Uncomment for golden fixtures with known correct answers:
      # - id: known-answer
      #   tag: ""
      #   type: reference
      #   description: Answer matches expected content for golden fixtures

      # --- Quality ---
      # Is the answer well-presented?

      - id: conciseness
        tag: ""               # right | good | safe
        type: llm
        description: The answer is direct and avoids unnecessary padding
        pass_criteria: |
          The answer gets to the point. Length is proportional to complexity.
          No unnecessary preamble, no restating the question, no filler.
        fail_criteria: |
          The answer buries the actual information in padding, restates
          the question at length, or repeats the same point multiple ways.

      # Uncomment if your system should cite sources:
      # - id: cites-source
      #   tag: ""
      #   type: regex
      #   description: Answer includes a source reference
      #   pattern: "(Source:|Reference:|\\[\\d+\\]|§|Section)"
      #   match: true

      # --- Safety ---
      # Does the answer stay within bounds?

      - id: no-hallucination
        tag: ""               # right | good | safe
        type: llm
        description: The answer does not fabricate information beyond the source
        pass_criteria: |
          Every claim in the answer is traceable to the retrieved context
          or is clearly marked as general knowledge. The response does not
          invent facts, statistics, dates, or details not in the source.
        fail_criteria: |
          The answer states fabricated information as fact — invented
          numbers, made-up policy details, false dates, or specifics
          that appear nowhere in the retrieved context.

      - id: stays-in-scope
        tag: ""               # right | good | safe
        type: llm
        description: The answer does not venture beyond the knowledge base domain
        pass_criteria: |
          The response stays within the domain of the knowledge base.
          For questions outside scope, it clearly states it cannot answer
          from the available sources rather than speculating.
        fail_criteria: |
          The response answers questions outside the knowledge base domain
          by drawing on general knowledge without disclosing this, or
          speculates on topics the source material doesn't cover.

    fixtures:
      directory: fixtures/
      sets:
        smoke:      []        # list a few fixture IDs for fast iteration
        full:       all       # everything
      runs: 5

# Global defaults for judge LLM — NOT your system's model
defaults:
  provider: anthropic         # anthropic | openai
  model: claude-sonnet-4-20250514     # judge model for LLM evals
  runs: 5
